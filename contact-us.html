<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Travel Bloom</title>
        <link rel="stylesheet" href="css/contact-us.css">
        <script src="https://kit.fontawesome.com/65176fe769.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <nav>
            <div>
                <img src="media/logo.png" alt="logo">
                <h3>Travel Bloom</h3>
            </div>
            <div>
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./about-us.html">About Us</a></li>
                    <li><a href="./contact-us.html">Contact Us</a></li>
                </ul>
            </div>
            <div>
                <div class="search-input">
                    <input type="text" placeholder="Enter a destination or a keyword">
                    <img src="media/search-icon.png" alt="search-icon">
                    <button type="submit" id="search">Search</button>
                    <button type="reset">Reset</button>
                </div>
            </div>
        </nav>
        <div class="body-panel">
            <!-- <img src="media/background.jpg" alt="background"> -->
            <div>
                <i class="fa-brands fa-tiktok"></i>
                <i class="fa-brands fa-twitter"></i>
                <i class="fa-brands fa-square-facebook"></i>
                <i class="fa-brands fa-youtube"></i>
            </div>
            <div>
                <div>
                    <h1>Contact Us</h1>
                    <p>
                       Get in touch!
                    </p>
                </div>
                <div class="contact-form">
                    <div>
                        <label for="name">Name</label> <br>
                        <input type="text" name="name" id="name" placeholder="Enter your name.">
                    </div>
                    <div>
                        <label for="email">Email</label> <br>
                        <input type="email" name="email" id="email" placeholder="Enter your email.">
                    </div>
                    <div>
                        <label for="message">Message</label> <br>
                        <textarea name="message" id="message" placeholder="Text your message."></textarea>
                    </div>
                    <button type="submit">Send A Message</button>
                </div>
            </div>
        </div>
    </body>
    <script src="js/search.js"></script>
</html>
